# Host Nginx reverse proxy. Put this at /etc/nginx/sites-available/portfolio
# (Ubuntu) or /etc/nginx/conf.d/portfolio.conf (Oracle Linux), then enable + reload.
# Replace your-domain.com with your domain, or use your instance's public IP.

server {
    listen 80;
    server_name your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# After this works on port 80, run:  sudo certbot --nginx -d your-domain.com
# Certbot rewrites this file to add HTTPS (port 443) automatically.
