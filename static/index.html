<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khalid Alznaidi</title>
  <style>
    :root { --accent: #1f4e79; --bg: #f7f8fa; --card: #ffffff; --text: #1a1a1a; --muted: #666; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; }
    header { background: var(--accent); color: #fff; padding: 48px 24px; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }
    header h1 { margin: 0 0 6px; font-size: 2.2rem; }
    header p { margin: 0; opacity: 0.9; }
    main { padding: 32px 0 64px; }
    h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 6px; }
    .card { background: var(--card); border: 1px solid #e3e6ea; border-radius: 10px;
            padding: 18px 20px; margin: 16px 0; }
    .card h3 { margin: 0 0 6px; }
    .card p { margin: 0 0 10px; color: var(--text); }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: #eef2f7; color: var(--accent); font-size: 0.8rem;
           padding: 3px 9px; border-radius: 999px; }
    footer { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 24px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Khalid Alznaidi</h1>
      <p>Electrical Engineering undergraduate &middot; software &amp; embedded systems</p>
    </div>
  </header>

  <main class="wrap">
    <h2>Projects</h2>
    <div id="projects">Loading&hellip;</div>
  </main>

  <footer>
    Served by FastAPI in Docker on Oracle Cloud &middot; auto-deployed via GitHub Actions
  </footer>

  <script>
    // Fetches the backend API and renders it — proves this is a real app, not static HTML.
    fetch("/api/projects")
      .then((r) => r.json())
      .then((projects) => {
        const el = document.getElementById("projects");
        el.innerHTML = projects.map((p) => `
          <div class="card">
            <h3>${p.name}</h3>
            <p>${p.blurb}</p>
            <div class="tags">${p.stack.map((s) => `<span class="tag">${s}</span>`).join("")}</div>
          </div>`).join("");
      })
      .catch(() => {
        document.getElementById("projects").textContent = "Could not load projects.";
      });
  </script>
</body>
</html>
